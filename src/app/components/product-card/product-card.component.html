<ion-card class="product-card" (click)="goToDetail()">
  <!-- DISCOUNT BADGE -->
  <div
    class="discount-badge"
    *ngIf="product.mrp && product.price && product.mrp > product.price"
  >
    {{ (((product.mrp - product.price) * 100) / product.mrp).toFixed(0) }}% OFF
  </div>

  <!-- WISHLIST -->
  <ion-button
    fill="clear"
    class="wishlist-btn"
    (click)="toggleWishlist($event)"
  >
    <ion-icon
      [name]="isWishlisted ? 'heart' : 'heart-outline'"
      [color]="isWishlisted ? 'danger' : 'medium'"
    >
    </ion-icon>
  </ion-button>

  <!-- IMAGE -->
  <div class="image-wrapper">
    <ion-img [src]="product.image"></ion-img>
  </div>

  <ion-card-content>
    <!-- CATEGORY -->
    <p class="category">
      {{ product.category_name || "Product" }}
    </p>

    <!-- TITLE -->
    <h3 class="product-title">
      {{ product.name }}
    </h3>

    <!-- RATING -->
    <div class="rating-row">
      <div class="stars">
        <ion-icon name="star"></ion-icon>
        <ion-icon name="star"></ion-icon>
        <ion-icon name="star"></ion-icon>
        <ion-icon name="star"></ion-icon>
        <ion-icon name="star-half"></ion-icon>
      </div>

      <span class="rating-text">
        {{ product.rating || "4.5" }}
      </span>
    </div>

    <!-- PRICE -->
    <div class="price-row">
      <div class="price-section">
        <span class="new-price"> ₹{{ product.price }} </span>

        <span class="old-price" *ngIf="product.mrp"> ₹{{ product.mrp }} </span>
      </div>
    </div>

    <!-- ADD TO CART -->
    <ion-button expand="block" class="cart-btn" (click)="addToCart($event)">
      <ion-icon slot="start" name="cart-outline"> </ion-icon>

      Add to Cart
    </ion-button>
  </ion-card-content>
</ion-card>
